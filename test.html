<!DOCTYPE html>
<html>
<head>
  <title>Firebase Test</title>
</head>
<body>

<button onclick="login()">Login with Google</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6oWnXtx3g1do77YMu1hw7_b131W7Icns",
  authDomain: "shiva45-e144e.firebaseapp.com",
  projectId: "shiva45-e144e",
  storageBucket: "shiva45-e144e.firebasestorage.app",
  messagingSenderId: "743806150690",
  appId: "1:743806150690:web:0957cc94f9a91db32cc27b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.login = async function () {
  try {
    const result = await signInWithPopup(auth, provider);
    alert("Logged in: " + result.user.displayName);
  } catch (error) {
    alert("Error: " + error.message);
    console.error(error);
  }
};
</script>

</body>
</html>
